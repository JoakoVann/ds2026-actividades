    <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">

                <i class="bi bi-book-half"></i>

    <section class="mt-5 pt-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <div class="card p-4">
                        <h2 class="pb-2 text-center fw-lighter">Contacto</h2>
                        <form>
                            <div class="row mb-3">
                                <label for="inputEmail3" class="col-sm-2 col-form-label">Nombre</label>
                                <div class="col-sm-10">
                                    <input type="text" class="form-control" id="inputEmail3">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <label for="inputEmail3" class="col-sm-2 col-form-label">Email</label>
                                <div class="col-sm-10">
                                    <input type="email" class="form-control" id="inputEmail3">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-5 ">
                                    <select class="form-select" id="autoSizingSelect">
                                        <option selected>Seleccionar Asunto</option>
                                        <option value="1">Consulta</option>
                                        <option value="2">Reclamo</option>
                                        <option value="3">Sugerencia</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-floating mb-3">
                                <textarea class="form-control" placeholder="Comentarios hacia nosotros" id="floatingTextarea2" style="resize: none;"></textarea>
                                <label for="floatingTextarea2">Comentarios</label>
                            </div>
                            <div class="col-12">
                                <button class="btn btn-primary" type="submit">Enviar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
